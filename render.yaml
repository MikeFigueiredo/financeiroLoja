services:
  - type: web
    name: financeiroloja-backend
    runtime: node
    plan: free
    rootDir: backend
    # preDeployCommand não é suportado no plano free do Render — a migration roda aqui
    # dentro do buildCommand. É seguro rodar em toda implantação porque
    # backend/db/migrate.js controla quais migrations já foram aplicadas (tabela
    # schema_migrations). NÃO inclui o seed aqui: ele faz TRUNCATE nas tabelas e
    # apagaria dados reais a cada deploy. Rode o seed manualmente uma única vez pelo
    # Shell do Render (aba "Shell" do serviço): npm run seed
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
