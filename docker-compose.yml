services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-financeiroloja}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financeiroloja}
      POSTGRES_DB: ${POSTGRES_DB:-financeiroloja}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - financeiroloja_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-financeiroloja}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  financeiroloja_db_data:
